services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pdv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdv_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-pdv}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdv}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pdv}:${POSTGRES_PASSWORD:-pdv_dev_password}@postgres:5432/${POSTGRES_DB:-pdv}
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env (ver .env.example)}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      NODE_ENV: production
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
  backend_uploads:
